{% extends "base.html" %}
{% block title %}Connexion — Gestion Présences{% endblock %}

{% block content %}
<div style="max-width:400px; margin:60px auto;">
    <div class="card">
        <h2>Connexion</h2>
        <form method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="formateur@ecole.fr"
                       value="{{ email_saisi|default('') }}" required autofocus>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" required>
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%">
                Se connecter
            </button>
        </form>
    </div>
</div>
{% endblock %}
